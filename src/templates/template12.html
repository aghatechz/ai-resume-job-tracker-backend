<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Professional Resume – Minimal Timeline</title>
<style>
/* ===== Global ===== */
body{
    margin:0;
    padding:0;
    background:#ffffff;
    font-family: Georgia, "Times New Roman", serif;
    color:#2c3e50;
}

/* ===== Resume Wrapper ===== */
.resume{
    max-width:820px;
    margin:40px auto;
    padding:45px 55px;
    border:1px solid #dcdcdc;
}

/* ===== Header ===== */
.header{
    text-align:center;
    margin-bottom:35px;
}

.header h1{
    font-size:34px;
    margin-bottom:5px;
    color:#1a1a1a;
}

.header p{
    font-size:14px;
    color:#555;
}

/* ===== Section ===== */
.section{
    margin-bottom:30px;
}

.section h2{
    font-size:17px;
    letter-spacing:1px;
    text-transform:uppercase;
    border-left:4px solid #2c3e50;
    padding-left:10px;
    margin-bottom:15px;
}

/* ===== Timeline ===== */
.item{
    position:relative;
    padding-left:25px;
    margin-bottom:18px;
}

.item::before{
    content:"";
    position:absolute;
    left:0;
    top:6px;
    width:10px;
    height:10px;
    background:#2c3e50;
    border-radius:50%;
}

.item p{
    font-size:15px;
    color:#444;
}

/* ===== Skills ===== */
.skills{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
}

.skills span{
    font-size:14px;
    padding:6px 12px;
    border:1px solid #ccc;
    border-radius:20px;
}
</style>
</head>
<body>

<div class="resume">

  <div class="header">
    <h1>{{name}}</h1>
    <p>{{email}} | {{phone}}</p>
  </div>

  <div class="section">
    <h2>Experience</h2>
    <div class="item"><p>{{experience}}</p></div>
  </div>

  <div class="section">
    <h2>Education</h2>
    <div class="item"><p>{{education}}</p></div>
  </div>

  <div class="section">
    <h2>Skills</h2>
    <div class="skills">{{skills}}</div>
  </div>

</div>

</body>
</html>
