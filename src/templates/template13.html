<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Executive Resume – Dark Premium</title>
<style>
/* ===== Global ===== */
body{
    margin:0;
    padding:0;
    background:#ffffff;
    font-family: "Segoe UI", Arial, sans-serif;
}

/* ===== Resume ===== */
.resume{
    max-width:900px;
    margin:40px auto;
    display:flex;
    border:1px solid #ddd;
}

/* ===== Left Dark Panel ===== */
.left{
    width:35%;
    background:#1f2933;
    color:#ffffff;
    padding:40px 30px;
}

.left h1{
    font-size:30px;
    margin-bottom:8px;
}

.left p{
    font-size:14px;
    color:#d1d5db;
    margin-bottom:6px;
}

.left h2{
    font-size:15px;
    margin-top:30px;
    margin-bottom:10px;
    text-transform:uppercase;
    letter-spacing:1px;
    border-bottom:1px solid #9ca3af;
    padding-bottom:5px;
}

.skill{
    font-size:14px;
    margin-bottom:6px;
}

/* ===== Right Light Panel ===== */
.right{
    width:65%;
    padding:40px 45px;
    background:#ffffff;
}

.section{
    margin-bottom:30px;
}

.section h2{
    font-size:18px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:#1f2933;
    border-bottom:2px solid #1f2933;
    padding-bottom:6px;
    margin-bottom:12px;
}

.section p{
    font-size:15px;
    color:#374151;
    line-height:1.6;
}
</style>
</head>
<body>

<div class="resume">

  <div class="left">
    <h1>{{name}}</h1>
    <p>{{email}}</p>
    <p>{{phone}}</p>

    <h2>Skills</h2>
    <div class="skill">{{skills}}</div>
  </div>

  <div class="right">
    <div class="section">
      <h2>Profile</h2>
      <p>{{summary}}</p>
    </div>

    <div class="section">
      <h2>Experience</h2>
      <p>{{experience}}</p>
    </div>

    <div class="section">
      <h2>Education</h2>
      <p>{{education}}</p>
    </div>
  </div>

</div>

</body>
</html>
