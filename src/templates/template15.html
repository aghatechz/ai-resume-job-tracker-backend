<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Resume – Card Design</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#eef2ff;
}

/* ===== Main Card ===== */
.container{
  max-width:850px;
  margin:60px auto;
  background:#ffffff;
  border-radius:22px;
  box-shadow:0 20px 45px rgba(0,0,0,0.15);
  overflow:hidden;
}

/* ===== Header ===== */
.header{
  background:linear-gradient(135deg,#4338ca,#6366f1);
  color:#ffffff;
  padding:45px;
  text-align:center;
}

.header h1{
  margin:0;
  font-size:34px;
  font-weight:700;
}

.header p{
  margin-top:10px;
  font-size:15px;
  opacity:0.95;
}

/* ===== Content ===== */
.content{
  padding:40px 45px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
}

/* ===== Cards ===== */
.card{
  background:#f9fafb;
  border-radius:16px;
  padding:25px;
}

.card h2{
  font-size:16px;
  margin-bottom:12px;
  color:#4338ca;
  text-transform:uppercase;
  letter-spacing:1px;
}

.card p{
  font-size:15px;
  color:#374151;
  line-height:1.6;
}

/* ===== Skills ===== */
.skills{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.skills span{
  background:#4338ca;
  color:#ffffff;
  padding:6px 14px;
  border-radius:14px;
  font-size:13px;
}
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>{{name}}</h1>
    <p>{{email}} | {{phone}}</p>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="card">
      <h2>Experience</h2>
      <p>{{experience}}</p>
    </div>

    <div class="card">
      <h2>Education</h2>
      <p>{{education}}</p>
    </div>

    <div class="card">
      <h2>Skills</h2>
      <div class="skills">{{skills}}</div>
    </div>

  </div>

</div>

</body>
</html>
