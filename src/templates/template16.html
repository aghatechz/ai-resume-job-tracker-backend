<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Professional Resume – Corporate Style</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#f4f6f8;
}

/* ===== Main Container ===== */
.container{
  max-width:850px;
  margin:60px auto;
  background:#ffffff;
  border-radius:14px;
  box-shadow:0 12px 30px rgba(0,0,0,0.12);
}

/* ===== Header ===== */
.header{
  padding:40px 45px;
  border-bottom:2px solid #e5e7eb;
}

.header h1{
  margin:0;
  font-size:32px;
  color:#1f2933;
}

.header p{
  margin-top:8px;
  font-size:14px;
  color:#4b5563;
}

/* ===== Content ===== */
.content{
  padding:40px 45px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
}

/* ===== Section ===== */
.section{
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:22px;
}

.section h2{
  font-size:15px;
  margin-bottom:10px;
  color:#1f2933;
  text-transform:uppercase;
  letter-spacing:1px;
  border-bottom:1px solid #d1d5db;
  padding-bottom:6px;
}

.section p{
  font-size:15px;
  color:#374151;
  line-height:1.6;
}

/* ===== Skills ===== */
.skills{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.skills span{
  background:#e5e7eb;
  color:#1f2933;
  padding:6px 12px;
  border-radius:12px;
  font-size:13px;
}
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>{{name}}</h1>
    <p>{{email}} | {{phone}}</p>
  </div>

  <div class="content">

    <div class="section">
      <h2>Experience</h2>
      <p>{{experience}}</p>
    </div>

    <div class="section">
      <h2>Education</h2>
      <p>{{education}}</p>
    </div>

    <div class="section">
      <h2>Skills</h2>
      <div class="skills">{{skills}}</div>
    </div>

  </div>

</div>

</body>
</html>
