<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Professional Resume – Accent Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#f4f6f8;
}

/* Container */
.container{
  max-width:820px;
  margin:60px auto;
  background:#ffffff;
  border-radius:14px;
  padding:45px;
  box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

/* Header */
.header{
  text-align:center;
  margin-bottom:40px;
}

.header h1{
  font-size:32px;
  margin-bottom:8px;
  color:#1f2933;
}

.header p{
  font-size:14px;
  color:#4b5563;
}

/* Sections with left accent */
.content .section{
  border-left:5px solid #1f2933;
  padding:20px 20px 20px 25px;
  margin-bottom:20px;
  background:#f9fafb;
  border-radius:8px;
}

.content .section h2{
  font-size:16px;
  text-transform:uppercase;
  color:#1f2933;
  margin-bottom:10px;
}

.content .section p{
  font-size:15px;
  color:#374151;
  line-height:1.6;
}

/* Skills */
.skills{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:6px;
}

.skills span{
  background:#e5e7eb;
  color:#1f2933;
  padding:6px 12px;
  border-radius:12px;
  font-size:13px;
}
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>{{name}}</h1>
    <p>{{email}} | {{phone}}</p>
  </div>

  <div class="content">
    <div class="section">
      <h2>Experience</h2>
      <p>{{experience}}</p>
    </div>

    <div class="section">
      <h2>Education</h2>
      <p>{{education}}</p>
    </div>

    <div class="section">
      <h2>Skills</h2>
      <div class="skills">{{skills}}</div>
    </div>
  </div>

</div>

</body>
</html>
